<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Website Chatbot</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0d19;
            --sidebar-bg: #111322;
            --card-bg: rgba(255, 255, 255, 0.04);
            --border-color: rgba(255, 255, 255, 0.08);
            --text-color: #f1f2f6;
            --text-muted: #a4b0be;
            --primary-gradient: linear-gradient(135deg, #6c5ce7 0%, #a29bfe 100%);
            --accent-color: #00cec9;
            --user-bubble: linear-gradient(135deg, #6c5ce7 0%, #4834d4 100%);
            --assistant-bubble: #1e213a;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            height: 100vh;
            overflow: hidden;
        }

        /* Sidebar styling */
        .sidebar {
            width: 320px;
            background-color: var(--sidebar-bg);
            border-right: 1px solid var(--border-color);
            display: flex;
            flex-direction: column;
            padding: 24px;
            flex-shrink: 0;
            overflow-y: auto;
        }

        .logo-container {
            margin-bottom: 30px;
        }

        .logo-title {
            font-family: 'Outfit', sans-serif;
            font-size: 24px;
            font-weight: 800;
            background: linear-gradient(135deg, #6c5ce7 0%, #00cec9 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .sidebar-section {
            margin-bottom: 28px;
        }

        .section-title {
            font-family: 'Outfit', sans-serif;
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        label {
            display: block;
            font-size: 12px;
            color: var(--text-muted);
            margin-bottom: 6px;
            font-weight: 500;
        }

        input, select {
            width: 100%;
            background-color: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            padding: 10px 14px;
            color: var(--text-color);
            font-family: inherit;
            font-size: 14px;
            transition: all 0.3s ease;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #6c5ce7;
            background-color: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 2px rgba(108, 92, 231, 0.2);
        }

        .row-inputs {
            display: flex;
            gap: 12px;
        }

        .row-inputs .form-group {
            flex: 1;
        }

        button {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: var(--primary-gradient);
            box-shadow: 0 4px 15px rgba(108, 92, 231, 0.3);
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 6px 20px rgba(108, 92, 231, 0.4);
        }

        .btn-secondary {
            background-color: transparent;
            border: 1px solid rgba(235, 77, 75, 0.5);
            color: #eb4d4b;
            margin-top: 10px;
        }

        .btn-secondary:hover {
            background-color: rgba(235, 77, 75, 0.1);
        }

        /* Progress tracker */
        .progress-container {
            display: none;
            margin-top: 16px;
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
        }

        .progress-header {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            margin-bottom: 8px;
        }

        .progress-bar-bg {
            height: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
            overflow: hidden;
            margin-bottom: 8px;
        }

        .progress-bar-fill {
            height: 100%;
            width: 0%;
            background: var(--primary-gradient);
            transition: width 0.3s ease;
        }

        .progress-status {
            font-size: 11px;
            color: var(--text-muted);
        }

        /* Main Chat Area */
        .main-chat {
            flex: 1;
            display: flex;
            flex-direction: column;
            height: 100vh;
            background-color: var(--bg-color);
        }

        .chat-header {
            padding: 20px 32px;
            border-bottom: 1px solid var(--border-color);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-title-group h1 {
            font-size: 20px;
            font-weight: 800;
            font-family: 'Outfit', sans-serif;
        }

        .chat-title-group p {
            font-size: 12px;
            color: var(--text-muted);
        }

        .model-select-container {
            width: 220px;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            display: flex;
            flex-direction: column;
            gap: 24px;
        }

        /* Chat bubbles */
        .message {
            display: flex;
            flex-direction: column;
            max-width: 80%;
            animation: fadeIn 0.3s ease;
        }

        .message.user {
            align-self: flex-end;
        }

        .message.assistant {
            align-self: flex-start;
        }

        .message-bubble {
            padding: 14px 18px;
            border-radius: 16px;
            font-size: 15px;
            line-height: 1.5;
            word-wrap: break-word;
        }

        .message.user .message-bubble {
            background: var(--user-bubble);
            border-bottom-right-radius: 4px;
            box-shadow: 0 4px 10px rgba(108, 92, 231, 0.2);
        }

        .message.assistant .message-bubble {
            background-color: var(--assistant-bubble);
            border-bottom-left-radius: 4px;
            border: 1px solid var(--border-color);
        }

        .message-sources {
            margin-top: 10px;
            display: flex;
            flex-wrap: wrap;
            gap: 6px;
        }

        .source-tag {
            display: inline-flex;
            align-items: center;
            background-color: rgba(0, 206, 201, 0.1);
            color: var(--accent-color);
            border: 1px solid rgba(0, 206, 201, 0.2);
            padding: 4px 10px;
            border-radius: 12px;
            font-size: 11px;
            text-decoration: none;
            transition: all 0.2s ease;
        }

        .source-tag:hover {
            background-color: rgba(0, 206, 201, 0.2);
            transform: translateY(-1px);
        }

        /* Chat input */
        .chat-input-container {
            padding: 24px 32px 32px 32px;
            border-top: 1px solid var(--border-color);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
            background-color: rgba(255, 255, 255, 0.03);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 8px 12px;
            transition: border-color 0.3s;
        }

        .input-wrapper:focus-within {
            border-color: #6c5ce7;
            box-shadow: 0 0 10px rgba(108, 92, 231, 0.15);
        }

        .chat-input {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-color);
            font-size: 15px;
            padding: 8px;
            font-family: inherit;
        }

        .chat-input:focus {
            outline: none;
        }

        .send-btn {
            background: var(--primary-gradient);
            color: white;
            border: none;
            border-radius: 8px;
            padding: 8px 16px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: opacity 0.2s;
            width: auto;
        }

        .send-btn:hover {
            opacity: 0.9;
        }

        .send-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Glass statistics card inside sidebar */
        .stats-card {
            background: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 12px;
            margin-top: 10px;
            font-size: 13px;
            line-height: 1.5;
        }
    </style>
</head>
<body>

    <!-- Sidebar section -->
    <div class="sidebar">
        <div class="logo-container">
            <h1 class="logo-title">🤖 RAG Website</h1>
        </div>

        <div class="sidebar-section">
            <h2 class="section-title">⚙️ Crawler Settings</h2>
            <div class="form-group">
                <label for="crawl-url">Website URL</label>
                <input type="text" id="crawl-url" placeholder="https://example.com">
            </div>
            <div class="row-inputs">
                <div class="form-group">
                    <label for="max-pages">Max Pages</label>
                    <input type="number" id="max-pages" value="15" min="1" max="100">
                </div>
                <div class="form-group">
                    <label for="max-depth">Max Depth</label>
                    <input type="number" id="max-depth" value="2" min="1" max="5">
                </div>
            </div>
            <button id="index-btn" class="btn-primary">🚀 Index Website</button>

            <!-- Crawl Progress panel -->
            <div id="progress-panel" class="progress-container">
                <div class="progress-header">
                    <span id="progress-label">Crawling...</span>
                    <span id="progress-percent">0%</span>
                </div>
                <div class="progress-bar-bg">
                    <div id="progress-bar-fill" class="progress-bar-fill"></div>
                </div>
                <div id="progress-status" class="progress-status">Pages: 0</div>
            </div>
        </div>

        <div class="sidebar-section">
            <h2 class="section-title">📚 Knowledge Base</h2>
            <div class="form-group">
                <label for="website-scope">Select Target Scope</label>
                <select id="website-scope">
                    <option value="">Query All Websites</option>
                </select>
            </div>
            <div id="website-stats" class="stats-card" style="display: none;">
                <!-- Filled dynamically -->
            </div>
            <button id="delete-btn" class="btn-secondary" style="display: none;">🗑️ Delete Website</button>
        </div>

        <div style="margin-top: auto;">
            <button id="clear-btn" class="btn-secondary" style="border-color: rgba(255,255,255,0.15); color: var(--text-muted);">🧹 Clear Chat</button>
        </div>
    </div>

    <!-- Main Chat section -->
    <div class="main-chat">
        <div class="chat-header">
            <div class="chat-title-group">
                <h1>RAG chatbot</h1>
                <p>Retrieval-Augmented Generation from website context</p>
            </div>
            <div class="model-select-container">
                <select id="model-select">
                    <option value="google/gemini-2.5-flash">google/gemini-2.5-flash</option>
                    <option value="google/gemini-2.5-pro">google/gemini-2.5-pro</option>
                    <option value="google/gemini-3.5-flash">google/gemini-3.5-flash</option>
                    <option value="google/gemini-3.1-pro-preview">google/gemini-3.1-pro-preview</option>
                </select>
            </div>
        </div>

        <!-- Chat messages view -->
        <div id="chat-messages" class="chat-messages">
            <div class="message assistant">
                <div class="message-bubble">
                    Hello! I'm your RAG Web Assistant. Enter a URL in the sidebar to crawl and index a website, then ask me questions about its content.
                </div>
            </div>
        </div>

        <!-- Input field -->
        <div class="chat-input-container">
            <div class="input-wrapper">
                <input type="text" id="chat-input" class="chat-input" placeholder="Ask a question about the indexed website(s)..." disabled>
                <button id="send-btn" class="send-btn" disabled>Send</button>
            </div>
        </div>
    </div>

    <script>
        // API Base URL
        const API_BASE = '/api';

        // DOM elements
        const crawlUrlInput = document.getElementById('crawl-url');
        const maxPagesInput = document.getElementById('max-pages');
        const maxDepthInput = document.getElementById('max-depth');
        const indexBtn = document.getElementById('index-btn');
        const progressPanel = document.getElementById('progress-panel');
        const progressLabel = document.getElementById('progress-label');
        const progressPercent = document.getElementById('progress-percent');
        const progressBarFill = document.getElementById('progress-bar-fill');
        const progressStatus = document.getElementById('progress-status');

        const websiteScope = document.getElementById('website-scope');
        const websiteStats = document.getElementById('website-stats');
        const deleteBtn = document.getElementById('delete-btn');
        const clearBtn = document.getElementById('clear-btn');

        const modelSelect = document.getElementById('model-select');
        const chatMessages = document.getElementById('chat-messages');
        const chatInput = document.getElementById('chat-input');
        const sendBtn = document.getElementById('send-btn');

        let chatHistory = [];
        let indexedSites = [];
        let pollingInterval = null;

        // Fetch indexed websites
        async function fetchWebsites() {
            try {
                const response = await fetch(`${API_BASE}/websites`);
                if (response.ok) {
                    indexedSites = await response.json();
                    updateWebsiteDropdown();
                }
            } catch (err) {
                console.error("Error fetching websites:", err);
            }
        }

        // Update dropdown list
        function updateWebsiteDropdown() {
            const currentSelection = websiteScope.value;
            websiteScope.innerHTML = '<option value="">Query All Websites</option>';
            
            indexedSites.forEach(site => {
                const option = document.createElement('option');
                option.value = site.url;
                option.textContent = site.url;
                websiteScope.appendChild(option);
            });

            // Restore selection if it still exists
            if (indexedSites.some(s => s.url === currentSelection)) {
                websiteScope.value = currentSelection;
                updateStatsPanel(currentSelection);
            } else {
                websiteScope.value = "";
                updateStatsPanel("");
            }

            // Enable or disable chat input based on whether we have indexed sites
            if (indexedSites.length > 0) {
                chatInput.removeAttribute('disabled');
                sendBtn.removeAttribute('disabled');
                chatInput.placeholder = "Ask a question about the indexed website(s)...";
            } else {
                chatInput.setAttribute('disabled', 'true');
                sendBtn.setAttribute('disabled', 'true');
                chatInput.placeholder = "Please index a website first to start chatting.";
            }
        }

        // Update selected site stats
        function updateStatsPanel(url) {
            if (!url) {
                websiteStats.style.display = 'none';
                deleteBtn.style.display = 'none';
                return;
            }

            const site = indexedSites.find(s => s.url === url);
            if (site) {
                websiteStats.innerHTML = `
                    <strong>Title:</strong> ${site.title || 'Untitled'}<br>
                    <strong>Pages:</strong> ${site.pages_count} crawled
                `;
                websiteStats.style.display = 'block';
                deleteBtn.style.display = 'block';
            }
        }

        // Dropdown selection change
        websiteScope.addEventListener('change', (e) => {
            updateStatsPanel(e.target.value);
        });

        // Delete website
        deleteBtn.addEventListener('click', async () => {
            const url = websiteScope.value;
            if (!url) return;

            if (confirm(`Are you sure you want to delete all indexed data for ${url}?`)) {
                deleteBtn.setAttribute('disabled', 'true');
                deleteBtn.textContent = 'Deleting...';
                try {
                    const response = await fetch(`${API_BASE}/websites?website_url=${encodeURIComponent(url)}`, {
                        method: 'DELETE'
                    });
                    if (response.ok) {
                        await fetchWebsites();
                    } else {
                        alert("Failed to delete website.");
                    }
                } catch (err) {
                    alert("Network error deleting website.");
                } finally {
                    deleteBtn.removeAttribute('disabled');
                    deleteBtn.textContent = '🗑️ Delete Website';
                }
            }
        });

        // Trigger indexing
        indexBtn.addEventListener('click', async () => {
            const url = crawlUrlInput.value.trim();
            if (!url) {
                alert("Please enter a URL first.");
                return;
            }

            indexBtn.setAttribute('disabled', 'true');
            progressPanel.style.display = 'block';
            updateProgressBar(0, 'pending', 'Starting...');

            try {
                const response = await fetch(`${API_BASE}/crawl`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        url: url,
                        max_pages: parseInt(maxPagesInput.value) || 10,
                        max_depth: parseInt(maxDepthInput.value) || 1
                    })
                });

                if (response.ok) {
                    const data = await response.json();
                    pollCrawlStatus(data.job_id);
                } else {
                    const err = await response.text();
                    alert(`Failed to start crawl: ${err}`);
                    indexBtn.removeAttribute('disabled');
                    progressPanel.style.display = 'none';
                }
            } catch (err) {
                alert(`Error: ${err}`);
                indexBtn.removeAttribute('disabled');
                progressPanel.style.display = 'none';
            }
        });

        // Poll crawler job status
        function pollCrawlStatus(jobId) {
            if (pollingInterval) clearInterval(pollingInterval);

            pollingInterval = setInterval(async () => {
                try {
                    const response = await fetch(`${API_BASE}/crawl-status/${jobId}`);
                    if (response.ok) {
                        const data = await response.json();
                        updateProgressBar(data.progress, data.status, `Pages: ${data.crawled_count}`);

                        if (data.status === 'completed') {
                            clearInterval(pollingInterval);
                            alert("Website successfully indexed!");
                            indexBtn.removeAttribute('disabled');
                            progressPanel.style.display = 'none';
                            crawlUrlInput.value = '';
                            await fetchWebsites();
                        } else if (data.status === 'failed') {
                            clearInterval(pollingInterval);
                            alert(`Indexing failed: ${data.errors.join(', ')}`);
                            indexBtn.removeAttribute('disabled');
                            progressPanel.style.display = 'none';
                        }
                    }
                } catch (err) {
                    console.error("Error polling crawl status:", err);
                }
            }, 1000);
        }

        // Helper to update progress UI
        function updateProgressBar(progress, status, msg) {
            progressPercent.textContent = `${Math.round(progress)}%`;
            progressBarFill.style.width = `${progress}%`;
            progressLabel.textContent = `Status: ${status.toUpperCase()}`;
            progressStatus.textContent = msg;
        }

        // Send chat message
        async function sendMessage() {
            const query = chatInput.value.trim();
            if (!query) return;

            // Render user bubble
            appendMessage('user', query);
            chatInput.value = '';
            chatInput.setAttribute('disabled', 'true');
            sendBtn.setAttribute('disabled', 'true');

            // Assistant thinking message
            const thinkingId = appendMessage('assistant', 'Thinking...');

            const payload = {
                query: query,
                website_url: websiteScope.value || null,
                chat_history: chatHistory,
                model_override: modelSelect.value
            };

            try {
                const response = await fetch(`${API_BASE}/chat`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    const data = await response.json();
                    // Remove thinking message and replace it
                    removeMessage(thinkingId);
                    appendMessage('assistant', data.answer, data.sources);
                    
                    // Save history
                    chatHistory.push({ role: 'user', content: query });
                    chatHistory.push({ role: 'assistant', content: data.answer });
                } else {
                    removeMessage(thinkingId);
                    appendMessage('assistant', 'Error generating response from the backend server.');
                }
            } catch (err) {
                removeMessage(thinkingId);
                appendMessage('assistant', `Connection failure: ${err}`);
            } finally {
                chatInput.removeAttribute('disabled');
                sendBtn.removeAttribute('disabled');
                chatInput.focus();
            }
        }

        // Add message bubble
        function appendMessage(role, text, sources = []) {
            const id = 'msg_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
            const msgDiv = document.createElement('div');
            msgDiv.className = `message ${role}`;
            msgDiv.id = id;

            const bubble = document.createElement('div');
            bubble.className = 'message-bubble';
            bubble.textContent = text;
            msgDiv.appendChild(bubble);

            if (role === 'assistant' && sources && sources.length > 0) {
                const sourcesDiv = document.createElement('div');
                sourcesDiv.className = 'message-sources';
                
                sources.forEach((src, idx) => {
                    const link = document.createElement('a');
                    link.className = 'source-tag';
                    link.href = src.source;
                    link.target = '_blank';
                    link.textContent = `[${idx+1}] ${src.title || 'Page'} (${src.content_type} - ${Math.round(src.score*100)}%)`;
                    sourcesDiv.appendChild(link);
                });
                msgDiv.appendChild(sourcesDiv);
            }

            chatMessages.appendChild(msgDiv);
            chatMessages.scrollTop = chatMessages.scrollHeight;
            return id;
        }

        function removeMessage(id) {
            const el = document.getElementById(id);
            if (el) el.remove();
        }

        // Event listeners
        sendBtn.addEventListener('click', sendMessage);
        chatInput.addEventListener('keydown', (e) => {
            if (e.key === 'Enter') sendMessage();
        });

        clearBtn.addEventListener('click', () => {
            chatHistory = [];
            chatMessages.innerHTML = `
                <div class="message assistant">
                    <div class="message-bubble">
                        Chat history cleared. What would you like to know about the indexed sites?
                    </div>
                </div>
            `;
        });

        // Initialize on load
        fetchWebsites();
    </script>
</body>
</html>
